// Hot takes history management via localStorage
const HISTORY_KEY = "fanbase_hottakes_history";
const TODAY = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

function getHotTakesData() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveHotTakesData(data) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(data)); } catch {}
}

function getTodaysTake(teamName, sport) {
  const pool = HOT_TAKES_POOL[teamName] || DEFAULT_POOL(teamName, sport);
  const data = getHotTakesData();
  const teamData = data[teamName] || { history: [], lastDate: null, index: -1 };

  // If we already picked a take today, return it
  if (teamData.lastDate === TODAY) {
    return { take: pool[teamData.index % pool.length], history: teamData.history, isNew: false };
  }

  // Pick next take in rotation (skip ones already used today)
  const nextIndex = (teamData.index + 1) % pool.length;
  const take = pool[nextIndex];

  // Add yesterday's take to history if there was one
  const newHistory = teamData.lastDate && teamData.index >= 0
    ? [{ date: teamData.lastDate, take: pool[teamData.index % pool.length] }, ...teamData.history].slice(0, 14)
    : teamData.history;

  // Save
  data[teamName] = { history: newHistory, lastDate: TODAY, index: nextIndex };
  saveHotTakesData(data);

  return { take, history: newHistory, isNew: true };
}

function getStatic(name, sport) {
  const { take, history, isNew } = getTodaysTake(name, sport || "");
  const base = STATIC_FACTS[name] || { keyFact: "Full season stats and roster data powered by ESPN." };
  return { hotTake: take, keyFact: base.keyFact, hotTakeHistory: history, isNewTake: isNew };
}

function getPosition(pos, sport){
  const nba={PG:"Point Guard",SG:"Shooting Guard",SF:"Small Forward",PF:"Power Forward",C:"Center",G:"Guard",F:"Forward",GF:"Guard-Forward",FC:"Forward-Center"};
  const nfl={QB:"Quarterback",RB:"Running Back",WR:"Wide Receiver",TE:"Tight End",FB:"Fullback",OT:"Offensive Tackle",OG:"Offensive Guard",OL:"Offensive Lineman",C:"Center",DE:"Defensive End",DT:"Defensive Tackle",NT:"Nose Tackle",LB:"Linebacker",OLB:"Outside Linebacker",ILB:"Inside Linebacker",MLB:"Middle Linebacker",CB:"Cornerback",S:"Safety",SS:"Strong Safety",FS:"Free Safety",DB:"Defensive Back",K:"Kicker",P:"Punter",LS:"Long Snapper"};
  const mlb={SP:"Starting Pitcher",RP:"Relief Pitcher",CL:"Closer",MR:"Middle Reliever",C:"Catcher",SS:"Shortstop","1B":"First Base","2B":"Second Base","3B":"Third Base",LF:"Left Field",CF:"Center Field",RF:"Right Field",OF:"Outfield",DH:"Designated Hitter",IF:"Infield"};
  const nhl={C:"Center",LW:"Left Wing",RW:"Right Wing",D:"Defenseman",G:"Goalie"};
  const map=sport==="basketball"?nba:sport==="football"?nfl:sport==="baseball"?mlb:sport==="hockey"?nhl:{};
  return map[pos]||pos;
}

function timeSince(dateStr){
  if(!dateStr)return"";
  const diff=(Date.now()-new Date(dateStr))/1000;
  if(diff<60)return"now";
  if(diff<3600)return Math.floor(diff/60)+"m";
  if(diff<86400)return Math.floor(diff/3600)+"h";
  return Math.floor(diff/86400)+"d";
}

function parseRecord(t){const items=t?.record?.items||[];for(const i of items){if(i.summary)return i.summary;}return null;}

function parseGame(sb,tid){
  for(const ev of(sb?.events||[])){
    const comp=ev.competitions?.[0];if(!comp)continue;
    const involved=comp.competitors?.some(c=>String(c.team?.id)===String(tid));if(!involved)continue;
    const[c1,c2]=comp.competitors;
    const status=ev.status?.type?.description||"";
    const n1=c1?.team?.shortDisplayName||"?",n2=c2?.team?.shortDisplayName||"?";
    const isFinal=status.toLowerCase().includes("final"),isLive=status.toLowerCase().includes("progress");
    if(isFinal)return`${n1} ${c1.score} – ${n2} ${c2.score} · Final`;
    if(isLive)return`🔴 LIVE: ${n1} ${c1.score} – ${n2} ${c2.score}`;
    const date=ev.date?new Date(ev.date).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
    return`Next: ${n1} vs ${n2}${date?" · "+date:""}`;
  }return null;
}

function parseScoreboardEvents(data, sportKey){
  return(data?.events||[]).map(ev=>{
    const comp=ev.competitions?.[0]||{};
    const competitors=comp.competitors||[];
    const home=competitors.find(c=>c.homeAway==="home")||competitors[0]||{};
    const away=competitors.find(c=>c.homeAway==="away")||competitors[1]||{};
    const isLive=ev.status?.type?.state==="in";
    const isFinal=ev.status?.type?.completed;
    return{
      id:ev.id, name:ev.name||"", date:ev.date, sportKey,
      status:ev.status,isLive,isFinal,
      homeTeam:{name:home.team?.shortDisplayName||"",abbr:home.team?.abbreviation||"",logo:home.team?.logo||"",score:home.score||"",winner:home.winner,color:"#"+(home.team?.color||"333")},
      awayTeam:{name:away.team?.shortDisplayName||"",abbr:away.team?.abbreviation||"",logo:away.team?.logo||"",score:away.score||"",winner:away.winner,color:"#"+(away.team?.color||"333")},
      broadcast:comp.broadcasts?.[0]?.names?.[0]||"",
      notes:comp.notes?.[0]?.headline||"",
    };
  });
}

function statusLabel(ev){
  const st=ev.status?.type;
  if(st?.completed)return"Final";
  if(st?.state==="in"){
    const clk=ev.status?.displayClock||"";
    const per=ev.status?.period||"";
    const sport=ev.sportKey||"";
    let periodStr=`${per}`;
    if(sport==="nba")periodStr=per===5?"OT":per>5?`${per-4}OT`:`Q${per}`;
    else if(sport==="nhl")periodStr=per===4?"OT":per>4?"SO":`P${per}`;
    else if(sport==="mlb"){const half=ev.status?.type?.shortDetail?.includes("Bot")?"Bot":"Top";periodStr=`${half} ${per}`;}
    return clk?`${clk} ${periodStr}`:st.shortDetail||"Live";
  }
  const d=ev.date?new Date(ev.date):null;
  if(d)return d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  return st?.shortDetail||"";
}

// ── DATA FETCHING ──────────────────────────────────────────────────────────────
async function loadTeamData(team){
  const[sp,lg]=team.espn.split("/");
  const scorePath=`sports/${sp}/${lg}/scoreboard`;
  const[tr,sr,nr,pr,tsr]=await Promise.all([
    fetch(`${PROXY}/team/${sp}/${lg}/${team.id}`).then(r=>r.json()).catch(()=>null),
    fetch(`${PROXY}/espn?path=${encodeURIComponent(scorePath)}`).then(r=>r.json()).catch(()=>null),
    fetch(`${PROXY}/news/${sp}/${lg}/${team.id}`).then(r=>r.json()).catch(()=>null),
    fetch(`${PROXY}/players/${sp}/${lg}/${team.id}`).then(r=>r.json()).catch(()=>null),
    fetch(`${PROXY}/teamstats/${sp}/${lg}/${team.id}`).then(r=>r.json()).catch(()=>null),
  ]);
  const td=tr?.team||tr||{};
  const statArr=td.record?.items?.[0]?.stats||[];
  const coach=td._headCoach||null;
  const articles=(nr?.articles||[]).slice(0,6).map(a=>({
    headline:a.headline||a.title||"",
    link:a.links?.web?.href||a.link||a.url||null,
    desc:a.description||a.summary||"",
    published:a.published?new Date(a.published).toLocaleDateString("en-US",{month:"short",day:"numeric"}):null,
  })).filter(a=>a.headline);
  return{
    record:parseRecord(td),standing:td.standingSummary||null,coach,
    venue:td.venue?.fullName||null,logo:td.logos?.[0]?.href||null,
    game:sr?parseGame(sr,team.id):null,
    pct:statArr.find(s=>s.name==="winPercent")?.displayValue||null,
    articles,players:pr?.players||[],
    teamStats:tsr?.categories||[],teamLeaders:tsr?.leaders||[],teamStatsYear:tsr?.season||null,
  };
}

function LiveScores(){
  const[activeSport,setActiveSport]=useState(LIVE_SPORTS[0]);
  const[events,setEvents]=useState([]);
  const[news,setNews]=useState([]);
  const[loading,setLoading]=useState(true);
  const[liveTab,setLiveTab]=useState("games");
  const timerRef=useRef(null);

  async function load(sp){
    setLoading(true);
    try{
      const[sbRes,newsRes]=await Promise.all([
        fetch(`${PROXY}/espn?path=${encodeURIComponent(`sports/${sp.espn}/scoreboard`)}`).then(r=>r.json()).catch(()=>null),
        fetch(`${PROXY}/espn?path=${encodeURIComponent(`sports/${sp.espn.split("/")[0]}/${sp.espn.split("/")[1]}/news?limit=8`)}`).then(r=>r.json()).catch(()=>null),
      ]);
      setEvents(sbRes?parseScoreboardEvents(sbRes,sp.key):[]);
      setNews((newsRes?.articles||[]).slice(0,8).map(a=>({
        headline:a.headline||a.title||"",
        link:a.links?.web?.href||a.link||a.url||null,
        desc:a.description||a.summary||"",
        when:a.published?timeSince(a.published)+" ago":null,
      })).filter(a=>a.headline));
    }finally{setLoading(false);}
  }

  useEffect(()=>{load(activeSport);},[activeSport]);
  useEffect(()=>{
    timerRef.current=setInterval(()=>load(activeSport),60000);
    return()=>clearInterval(timerRef.current);
  },[activeSport]);

  const liveEvs=events.filter(e=>e.isLive);
  const upcoming=events.filter(e=>!e.isLive&&!e.isFinal);
  const finals=events.filter(e=>e.isFinal);

  function GameCard({ev}){
    return(
      <div style={{background:"#141414",border:"1px solid #1f1f1f",borderRadius:"10px",padding:"13px 15px",marginBottom:"8px",borderLeft:ev.isLive?"3px solid #22c55e":"3px solid transparent"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"9px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
            {ev.isLive&&<span style={{width:"7px",height:"7px",borderRadius:"50%",background:"#22c55e",animation:"pulse 1.4s ease infinite",display:"inline-block"}}/>}
            <span style={{fontSize:"11px",fontFamily:"monospace",color:ev.isLive?"#22c55e":ev.isFinal?"#555":"#888"}}>{statusLabel(ev)}</span>
          </div>
          {ev.broadcast&&<span style={{fontSize:"10px",color:"#444",fontFamily:"monospace"}}>{ev.broadcast}</span>}
        </div>
        {[ev.awayTeam,ev.homeTeam].map((team,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:i===0?"7px":"0"}}>
            {team.logo?<img src={team.logo} alt="" style={{width:"26px",height:"26px",objectFit:"contain"}}/>:<div style={{width:"26px",height:"26px",borderRadius:"50%",background:team.color+"33"}}/>}
            <span style={{flex:1,fontSize:"14px",fontWeight:team.winner?"700":"500",color:team.winner?"#fff":ev.isFinal?"#888":"#ddd"}}>{team.name}</span>
            <span style={{fontSize:"19px",fontWeight:"700",fontFamily:"monospace",color:team.winner?"#fff":ev.isFinal?"#555":"#ddd",minWidth:"24px",textAlign:"right"}}>{team.score}</span>
          </div>
        ))}
      </div>
    );
  }

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      {/* Sport tabs */}
      <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"12px",scrollbarWidth:"none",marginBottom:"4px"}}>
        {LIVE_SPORTS.map(sp=>{
          const on=activeSport.key===sp.key;
          return<button key={sp.key} className="sp" onClick={()=>{setActiveSport(sp);setLiveTab("games");}} style={{padding:"6px 14px",borderRadius:"20px",border:"1px solid "+(on?sp.color:"#2a2a2a"),background:on?sp.color+"22":"#141414",color:on?sp.color:"#888",fontSize:"12px",fontWeight:on?"700":"400",fontFamily:"monospace",flexShrink:0}}>{sp.label}</button>;
        })}
      </div>

      {/* Games / News tabs */}
      <div style={{display:"flex",gap:"3px",background:"#0d0d0d",padding:"3px",borderRadius:"7px",border:"1px solid #1a1a1a",marginBottom:"14px"}}>
        {[["games","🏟 Games"],["news","📰 News"]].map(([k,l])=>{
          const on=liveTab===k;
          return<button key={k} className="tb" onClick={()=>setLiveTab(k)} style={{flex:1,padding:"8px 4px",border:"none",borderRadius:"5px",background:on?"#1c1c1c":"transparent",color:on?"#f0ece4":"#666",fontFamily:"'DM Sans',Georgia,sans-serif",fontSize:"13px",fontWeight:on?"700":"400",borderBottom:on?"2px solid #c8102e":"2px solid transparent",cursor:"pointer"}}>{l}</button>;
        })}
      </div>

      {loading&&(
        <div style={{textAlign:"center",padding:"40px",color:"#555"}}>
          <div style={{width:"24px",height:"24px",border:"3px solid #333",borderTop:"3px solid #c8102e",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 12px"}}/>
          <div style={{fontSize:"11px",fontFamily:"monospace"}}>LOADING...</div>
        </div>
      )}

      {!loading&&liveTab==="games"&&(
        <div>
          {liveEvs.length>0&&<div><div style={{fontSize:"10px",fontWeight:"700",color:"#22c55e",fontFamily:"monospace",letterSpacing:"0.1em",marginBottom:"8px"}}>🔴 LIVE NOW ({liveEvs.length})</div>{liveEvs.map(ev=><GameCard key={ev.id} ev={ev}/>)}<div style={{marginBottom:"16px"}}/></div>}
          {upcoming.length>0&&<div><div style={{fontSize:"10px",fontWeight:"700",color:"#888",fontFamily:"monospace",letterSpacing:"0.1em",marginBottom:"8px"}}>UPCOMING ({upcoming.length})</div>{upcoming.map(ev=><GameCard key={ev.id} ev={ev}/>)}<div style={{marginBottom:"16px"}}/></div>}

        </div>

      {!loading&&liveTab==="news"&&(
        <div>
          {news.map((a,i)=>(
            <a key={i} href={a.link||"#"} target="_blank" rel="noopener noreferrer">

          {news.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#333",fontFamily:"monospace",fontSize:"12px"}}>No news available</div>}
        </div>
      )}
    </div>
  );

    {q:"Someone asks how long you've been a fan:",options:['"My whole life"','"Since the dynasty"','"I appreciate good ball"','"Since [star] came up"'],bandwagon:[false,false,true,true]},
    {q:"4th quarter, down by 14. You:",options:["Stay and watch","Say 'Hard to watch' and open Twitter","Start looking up next week's schedule","Leave to beat traffic"],bandwagon:[false,false,true,true]},
    {q:"A true fan challenges your knowledge. You:",options:["Engage respectfully","Say 'I don't owe you a quiz'","Deflect: 'Stats don't measure heart'","Block and mute"],bandwagon:[false,true,true,true]},
  ];

  function doQ(bw){if(bw)setQSc(s=>s+1);if(qStep+1>=quiz.length)setQD(true);else setQS(s=>s+1);}
  function bwLvl(){
    if(qScore<=1)return{label:"Suspicious Loyalist",desc:"You might actually be a real fan.",color:"#22c55e"};
    if(qScore===2)return{label:"Emerging Opportunist",desc:"You've got the instincts.",color:"#f59e0b"};
    if(qScore===3)return{label:"Peak Bandwagoner",desc:"You are the reason sports Twitter exists.",color:"#ef4444"};
    return{label:"Transcendent Bandwagoner",desc:"A masterclass. You are the algorithm.",color:"#a855f7"};
  }

  const C=({children,s})=><div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"10px",padding:"13px 14px",...s}}>{children}</div>;
  const Lbl=({children})=><div style={{fontSize:"9px",fontFamily:"monospace",color:"#777",letterSpacing:"0.12em",marginBottom:"5px"}}>{children}</div>;

  return(
    <div style={{minHeight:"100vh",background:"#080808",fontFamily:"'DM Sans',Georgia,sans-serif",color:"#f0ece4",paddingBottom:"80px"}}>
      {/* Score ticker */}
      <div style={{background:"#c8102e",padding:"7px 0",overflow:"hidden",borderBottom:"1px solid #900"}}>
        <div style={{display:"flex",gap:"80px",animation:"scroll 22s linear infinite",whiteSpace:"nowrap"}}>
          {[0,1,2,3,4].map(i=><span key={i} style={{fontSize:"12px",letterSpacing:"0.06em",fontFamily:"monospace",fontWeight:"bold"}}>{ticks[ticker]+"   ·   "}</span>)}
        </div>
      </div>

      <div style={{maxWidth:"900px",margin:"0 auto",padding:"24px 16px 0"}}>
        {/* Header */}
        <div style={{textAlign:"center",marginBottom:"24px"}}>
          <div style={{fontSize:"11px",letterSpacing:"0.35em",color:"#c8102e",marginBottom:"8px",fontFamily:"monospace"}}>◆ THE COMPLETE SPORTS HUB ◆</div>
          <h1 style={{fontSize:"clamp(36px,8vw,60px)",fontWeight:"900",lineHeight:1,margin:"0 0 8px",letterSpacing:"-0.025em",background:"linear-gradient(135deg,#f0ece4 30%,#c8102e)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontFamily:"'Bebas Neue','DM Sans',Georgia,sans-serif"}}>FANBASE</h1>
          <p style={{color:"#666",fontSize:"13px",margin:0}}>Live scores · Team deep dives · {ALL_TEAMS.length} teams · Powered by ESPN</p>
        </div>

        {/* Main nav */}
        <div style={{display:"flex",gap:"3px",marginBottom:"22px",background:"#0d0d0d",padding:"4px",borderRadius:"8px",border:"1px solid #1a1a1a"}}>
          {[["scores","📡 Live Scores"],["teams","🏟 My Teams"],["quiz","🎯 Quiz"]].map(([k,l])=>{
            const on=appTab===k;
            return<button key={k} className="tb" onClick={()=>setAppTab(k)} style={{flex:1,padding:"10px 4px",border:"none",borderRadius:"6px",background:on?"#1c1c1c":"transparent",color:on?"#f0ece4":"#777",fontFamily:"'DM Sans',Georgia,sans-serif",fontSize:"13px",fontWeight:on?"bold":"normal",borderBottom:on?"2px solid #c8102e":"2px solid transparent",cursor:"pointer"}}>{l}</button>;
          })}
        </div>

        {/* ── LIVE SCORES TAB ── */}
        {appTab==="scores"&&<LiveScores/>}

        {/* ── MY TEAMS TAB ── */}
        {appTab==="teams"&&(
          <div>
            {/* Team nav sub-tabs */}
            <div style={{display:"flex",gap:"3px",marginBottom:"18px",background:"#0d0d0d",padding:"3px",borderRadius:"7px",border:"1px solid #1a1a1a"}}>
              {[["teams","🏟 Browse"],["favourites","⭐ Favourites"],["tips","📋 Fan Tips"]].map(([k,l])=>{
                const on=teamTab===k;
                return<button key={k} className="tb" onClick={()=>setTeamTab(k)} style={{flex:1,padding:"9px 4px",border:"none",borderRadius:"5px",background:on?"#1c1c1c":"transparent",color:on?"#f0ece4":"#666",fontFamily:"'DM Sans',Georgia,sans-serif",fontSize:"12px",fontWeight:on?"bold":"normal",borderBottom:on?"2px solid #c8102e":"2px solid transparent",cursor:"pointer"}}>{l}</button>;
              })}
            </div>

            {/* Team detail view */}
            {sel&&teamTab!=="tips"?(
              <div style={{animation:"flipIn .35s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                  <button onClick={()=>{setSel(null);setErr(null);}} className="sp" style={{display:"flex",alignItems:"center",gap:"8px",background:"#1a1a1a",border:"1px solid #333",color:"#ccc",padding:"8px 14px",borderRadius:"8px",fontSize:"13px",fontFamily:"'DM Sans',Georgia,sans-serif",cursor:"pointer"}}>← Back</button>
                  <button onClick={e=>toggleFav(sel.name,e)} style={{background:"none",border:"none",fontSize:"22px",cursor:"pointer",padding:"4px 8px"}} title={favs.includes(sel.name)?"Remove favourite":"Add to favourites"}>{favs.includes(sel.name)?"⭐":"☆"}</button>
                </div>

                {/* Hero */}
                <div style={{background:"linear-gradient(135deg,"+tc+"22,#080808)",border:"1px solid "+tc+"44",borderTop:"4px solid "+tc,borderRadius:"14px",padding:"20px 22px",marginBottom:"12px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                    {live?.logo&&<img src={live.logo} alt="" style={{width:"52px",height:"52px",objectFit:"contain",filter:"drop-shadow(0 0 8px rgba(255,255,255,0.12))"}}/>}
                    <div style={{flex:1}}>
                      <div style={{fontSize:"10px",fontFamily:"monospace",color:ac,letterSpacing:"0.2em",marginBottom:"3px"}}>{sel.sport} · LIVE ESPN</div>
                      <div style={{fontSize:"22px",fontWeight:"900",lineHeight:1.1,color:"#f0ece4"}}>{sel.name}</div>
                      {live?.standing&&<div style={{marginTop:"4px",fontSize:"12px",color:"#bbb"}}>{live.standing}</div>}
                    </div>
                  </div>
                </div>

                {loading&&<div style={{textAlign:"center",padding:"40px 0"}}><div style={{width:"26px",height:"26px",border:"3px solid "+tc+"33",borderTop:"3px solid "+tc,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 12px"}}/><div style={{fontFamily:"monospace",fontSize:"11px",color:"#777"}}>FETCHING LIVE DATA...</div><div style={{fontFamily:"monospace",fontSize:"10px",color:"#444",marginTop:"4px"}}>first load ~30s to wake proxy</div></div>}
                {err&&!loading&&<div style={{background:"#180808",border:"1px solid #c8102e44",borderRadius:"8px",padding:"12px",fontSize:"12px",color:"#ff8888",fontFamily:"monospace",marginBottom:"10px"}}>⚠ {err} <button className="sp" onClick={()=>{setErr(null);setCache(p=>{const n={...p};delete n[sel.name];return n;});pick(sel);}} style={{background:"#c8102e",border:"none",color:"white",padding:"4px 10px",borderRadius:"4px",cursor:"pointer",fontSize:"11px",marginLeft:"8px"}}>Retry</button></div>}

                {live&&!loading&&(
                  <div style={{animation:"fadeIn .4s ease"}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",marginBottom:"8px"}}>
                      <C><Lbl>RECORD</Lbl><div style={{fontSize:"16px",fontWeight:"900",color:"#f0ece4"}}>{live.record||"—"}</div>{live.pct&&<div style={{fontSize:"10px",color:"#888",marginTop:"2px"}}>{(parseFloat(live.pct)*100).toFixed(1)}% win rate</div>}</C>
                      <C><Lbl>HEAD COACH</Lbl><div style={{fontSize:"12px",fontWeight:"bold",color:"#f0ece4",lineHeight:1.3}}>{live.coach||"—"}</div></C>
                      <C><Lbl>HOME VENUE</Lbl><div style={{fontSize:"11px",fontWeight:"bold",color:"#f0ece4",lineHeight:1.3}}>{live.venue||"—"}</div></C>
                    </div>
                    {live.game&&<C s={{marginBottom:"8px"}}><Lbl>📡 LATEST GAME</Lbl><div style={{fontSize:"13px",color:"#ddd"}}>{live.game}</div></C>}

                    {/* Detail sub-tabs */}
                    <div style={{display:"flex",gap:"3px",margin:"12px 0 10px",background:"#0d0d0d",padding:"3px",borderRadius:"7px",border:"1px solid #1a1a1a"}}>
                      {[["hottakes","🔥 Hot Takes"],["stats","📊 Stats"],["news","📰 News"],["players","👤 Players"]].map(([k,l])=>{
                        const on=viewTab===k;
                        return<button key={k} className="tb" onClick={()=>setVTab(k)} style={{flex:1,padding:"7px 2px",border:"none",borderRadius:"5px",background:on?"#1c1c1c":"transparent",color:on?"#f0ece4":"#555",fontFamily:"'DM Sans',Georgia,sans-serif",fontSize:"11px",fontWeight:on?"bold":"normal",borderBottom:on?"2px solid "+ac:"2px solid transparent",cursor:"pointer"}}>{l}</button>;
                      })}
                    </div>

                    {/* Hot Takes */}
                    {viewTab==="hottakes"&&(
                      <div style={{animation:"fadeIn .3s ease"}}>
                        {/* Today's take */}
                        <div style={{background:tc+"15",border:"1px solid "+tc+"35",borderRadius:"10px",padding:"16px 18px",marginBottom:"9px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                            <Lbl>🔥 TODAY'S HOT TAKE</Lbl>
                            <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                              {ctx.isNewTake&&<span style={{fontSize:"9px",fontFamily:"monospace",background:"#c8102e",color:"#fff",padding:"2px 6px",borderRadius:"4px",letterSpacing:"0.05em"}}>NEW TODAY</span>}
                              <span style={{fontSize:"9px",fontFamily:"monospace",color:"#555"}}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                            </div>
                          </div>
                          <div style={{fontSize:"15px",fontStyle:"italic",color:"#f0ece4",lineHeight:1.65}}>"{ctx.hotTake}"</div>
                        </div>

                        {/* Key fact */}
                        <C s={{marginBottom:"9px"}}><Lbl>💡 DROP THIS TO SOUND LEGIT</Lbl><div style={{fontSize:"13px",color:"#ccc",lineHeight:1.6}}>{ctx.keyFact}</div></C>

                        {/* History */}
                        {ctx.hotTakeHistory&&ctx.hotTakeHistory.length>0&&(
                          <div>
                            <div style={{fontSize:"9px",fontFamily:"monospace",color:"#555",letterSpacing:"0.12em",marginBottom:"8px",marginTop:"14px",paddingTop:"12px",borderTop:"1px solid #1a1a1a"}}>📅 PREVIOUS HOT TAKES</div>
                            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                              {ctx.hotTakeHistory.map((item,i)=>(
                                <div key={i} style={{background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:"8px",padding:"10px 12px"}}>
                                  <div style={{fontSize:"9px",fontFamily:"monospace",color:"#555",marginBottom:"4px"}}>{new Date(item.date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
                                  <div style={{fontSize:"12px",fontStyle:"italic",color:"#888",lineHeight:1.5}}>"{item.take}"</div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {/* Stats */}
                    {viewTab==="stats"&&(
                      <div style={{animation:"fadeIn .3s ease"}}>
                        {live.teamLeaders&&live.teamLeaders.length>0?(
                          <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
                            <Lbl>TEAM SEASON LEADERS · {live.teamStatsYear||""}</Lbl>
                            {live.teamLeaders.map((item,i)=>{
                              const info=STAT_INFO[item.category]||{full:item.category,desc:"",link:null,max:100,good:"high"};
                              const pct=Math.min(100,Math.max(2,(parseFloat(String(item.value).replace(/[^0-9.]/g,""))||0)/info.max*100));
                              return<div key={i} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"12px 14px"}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
                                  <div style={{flex:1,marginRight:"10px"}}><div style={{fontSize:"9px",fontFamily:"monospace",color:"#777",marginBottom:"2px"}}>{info.full||item.category}</div><div style={{fontSize:"14px",fontWeight:"bold",color:"#f0ece4"}}>{item.athlete}</div><div style={{fontSize:"10px",color:"#777",fontFamily:"monospace"}}>{item.pos}</div></div>
                                  <div style={{textAlign:"right"}}><div style={{fontSize:"22px",fontWeight:"900",color:ac}}>{item.value}</div>{info.link&&<a href={info.link} target="_blank" rel="noopener noreferrer" style={{fontSize:"9px",color:"#aaa",textDecoration:"none",fontFamily:"monospace"}}>learn more ↗</a>}</div>
                                </div>
                                {info.desc&&<div style={{fontSize:"10px",color:"#999",marginBottom:"5px"}}>{info.desc}</div>}
                                <div style={{background:"#2a2a2a",borderRadius:"3px",height:"4px"}}><div style={{width:pct+"%",height:"100%",background:ac,borderRadius:"3px"}}/></div>
                              </div>;
                            })}
                          </div>
                        ):live.teamStats&&live.teamStats.length>0?(
                          <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
                            <Lbl>{(live.teamStatsYear||"")+" TEAM STATS · ESPN"}</Lbl>
                            {live.teamStats.map((cat,i)=>{
                              const valid=(cat.stats||[]).filter(s=>s.displayValue&&!["0","--","0.0","0.00",""].includes(s.displayValue));
                              if(!valid.length)return null;
                              return<div key={i}>
                                <div style={{fontSize:"10px",fontWeight:"bold",color:"#888",letterSpacing:"0.1em",marginBottom:"7px",paddingBottom:"5px",borderBottom:"1px solid #1a1a1a"}}>{(cat.displayName||cat.name||"").toUpperCase()}</div>
                                <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
                                  {valid.slice(0,10).map((s,j)=>{
                                    const info=getTeamStatInfo(s);
                                    const numVal=parseFloat(String(s.displayValue).replace(/[^0-9.]/g,""))||0;
                                    const pct=info.max?Math.min(100,Math.max(2,info.good==="low"?(1-(numVal/info.max))*100:(numVal/info.max)*100)):50;
                                    const barColor=info.good==="low"?"#60a5fa":ac;
                                    return<div key={j} style={{background:"#0d0d0d",borderRadius:"7px",padding:"9px 11px"}}>
                                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"5px"}}>
                                        <div style={{flex:1,marginRight:"10px"}}><div style={{fontSize:"11px",fontWeight:"bold",color:"#ccc"}}>{info.full}</div><div style={{fontSize:"10px",color:"#999",lineHeight:1.4,marginTop:"1px"}}>{info.desc}</div></div>
                                        <div style={{flexShrink:0,textAlign:"right"}}><div style={{fontSize:"17px",fontWeight:"900",color:"#f0ece4"}}>{s.displayValue}</div>{info.link&&<a href={info.link} target="_blank" rel="noopener noreferrer" style={{fontSize:"9px",color:"#aaa",fontFamily:"monospace"}}>learn more ↗</a>}</div>
                                      </div>
                                      <div style={{background:"#2a2a2a",borderRadius:"3px",height:"4px"}}><div style={{width:pct+"%",height:"100%",background:barColor,borderRadius:"3px"}}/></div>
                                      {info.max&&<div style={{fontSize:"9px",color:"#777",fontFamily:"monospace",marginTop:"3px"}}>{info.good==="high"?"↑ higher is better":"↓ lower is better"} · scale 0–{info.max}</div>}
                                    </div>;
                                  })}
                                </div>
                              </div>;
                            })}
                          </div>
                        ):<div style={{textAlign:"center",padding:"30px",color:"#555",fontFamily:"monospace",fontSize:"12px"}}>Team stats not available.</div>}
                      </div>
                    )}

                    {/* News */}
                    {viewTab==="news"&&(
                      <div style={{animation:"fadeIn .3s ease",display:"flex",flexDirection:"column",gap:"8px"}}>
                        {live.articles&&live.articles.length>0?live.articles.map((a,i)=>(
                          <div key={i} style={{background:"#141414",border:"1px solid #2a2a2a",borderLeft:"3px solid "+tc,borderRadius:"8px",padding:"12px 14px"}}>
                            {a.link?<a href={a.link} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}><div style={{fontSize:"13px",fontWeight:"bold",color:"#f0ece4",lineHeight:1.45,marginBottom:"4px"}}>{a.headline} ↗</div></a>:<div style={{fontSize:"13px",fontWeight:"bold",color:"#f0ece4",lineHeight:1.45,marginBottom:"4px"}}>{a.headline}</div>}
                            {a.desc&&<div style={{fontSize:"11px",color:"#888",lineHeight:1.5}}>{a.desc.slice(0,120)}{a.desc.length>120?"…":""}</div>}
                            {a.published&&<div style={{fontSize:"10px",color:"#444",fontFamily:"monospace",marginTop:"5px"}}>{a.published}</div>}
                          </div>
                        )):<div style={{textAlign:"center",padding:"30px",color:"#444",fontFamily:"monospace",fontSize:"12px"}}>No news via ESPN.</div>}
                      </div>
                    )}

                    {/* Players */}
                    {viewTab==="players"&&(()=>{
                      const players=live.players||[];
                      const positions=["ALL",...[...new Set(players.map(p=>p.pos).filter(Boolean))].sort()];
                      let displayed=playerPosFilter==="ALL"?players:players.filter(p=>p.pos===playerPosFilter);
                      if(playerSort==="pos")displayed=[...displayed].sort((a,b)=>(a.pos||"").localeCompare(b.pos||""));
                      else if(playerSort==="stat")displayed=[...displayed].sort((a,b)=>(parseFloat(String(b.stats?.[0]?.v||"0").replace(/[^0-9.]/g,""))||0)-(parseFloat(String(a.stats?.[0]?.v||"0").replace(/[^0-9.]/g,""))||0));
                      return(
                        <div style={{animation:"fadeIn .3s ease"}}>
                          {players.length>0?(
                            <div>
                              <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"8px"}}>
                                {positions.map(pos=>{const on=playerPosFilter===pos;return<button key={pos} className="sp" onClick={()=>setPlayerPosFilter(pos)} style={{padding:"4px 9px",borderRadius:"16px",border:"1px solid "+(on?ac:"#2a2a2a"),background:on?ac+"22":"#141414",color:on?ac:"#888",fontSize:"10px",fontFamily:"monospace"}}>{pos==="ALL"?"All":getPosition(pos,sp)}</button>;})}
                              </div>
                              <div style={{display:"flex",gap:"5px",alignItems:"center",marginBottom:"10px"}}>
                                <span style={{fontSize:"10px",color:"#555",fontFamily:"monospace"}}>SORT:</span>
                                {[["default","Roster"],["pos","Position"],["stat","Top Stat ↓"]].map(([k,l])=>{const on=playerSort===k;return<button key={k} className="sp" onClick={()=>setPlayerSort(k)} style={{padding:"4px 9px",borderRadius:"16px",border:"1px solid "+(on?"#c8102e":"#2a2a2a"),background:on?"#c8102e22":"#141414",color:on?"#c8102e":"#888",fontSize:"10px",fontFamily:"monospace"}}>{l}</button>;})}
                              </div>
                              <div style={{fontSize:"10px",fontFamily:"monospace",color:"#555",marginBottom:"8px"}}>{displayed.length} of {players.length} players</div>
                              {playerSort==="pos"?(()=>{
                                const groups={};
                                for(const p of displayed){const k=p.pos||"?";if(!groups[k])groups[k]=[];groups[k].push(p);}
                                return Object.entries(groups).map(([pos,ps])=>(
                                  <div key={pos} style={{marginBottom:"14px"}}>
                                    <div style={{fontSize:"10px",fontWeight:"bold",color:ac,fontFamily:"monospace",letterSpacing:"0.1em",marginBottom:"7px",paddingBottom:"5px",borderBottom:"1px solid #1a1a1a"}}>{getPosition(pos,sp)} ({ps.length})</div>
                                    {ps.map((p,i)=><PlayerCard key={i} p={p} ac={ac} sport={sp}/>)}
                                  </div>
                                ));
                              })():displayed.map((p,i)=><PlayerCard key={i} p={p} ac={ac} sport={sp}/>)}
                            </div>
                          ):<div style={{textAlign:"center",padding:"30px",color:"#555",fontFamily:"monospace",fontSize:"12px"}}>No player stats available.</div>}
                        </div>
                      );
                    })()}
                  </div>
                )}
              </div>
            ):teamTab==="tips"?(
              /* Tips */
              <div style={{animation:"fadeIn .4s ease"}}>
                {tips.map((sec,i)=>{const open=openTip===i;return(
                  <div key={i} className="tip" onClick={()=>setOT(open?null:i)} style={{background:"#111",border:"1px solid #252525",borderLeft:open?"3px solid #c8102e":"3px solid transparent",borderRadius:"8px",marginBottom:"8px",overflow:"hidden"}}>
                    <div style={{padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:"14px",fontWeight:"bold",color:"#f0ece4"}}>{sec.icon} {sec.category}</span>
                      <span style={{color:"#888",fontSize:"18px"}}>{open?"−":"+"}</span>
                    </div>
                    {open&&<div style={{padding:"0 16px 16px"}}>
                      {sec.tips.map((tip,j)=><div key={j} style={{padding:"8px 11px",marginBottom:"5px",background:"#0d0d0d",borderRadius:"6px",fontSize:"13px",lineHeight:1.55,color:"#ddd",display:"flex",gap:"10px"}}>
                        <span style={{color:"#c8102e",flexShrink:0,fontFamily:"monospace"}}>{String(j+1).padStart(2,"0")}</span>{tip}
                      </div>)}
                    </div>}
                  </div>
                );})}
              </div>
            ):(
              /* Team Grid */
              <div style={{animation:"fadeIn .4s ease"}}>
                <div style={{display:"flex",gap:"8px",marginBottom:"11px",flexWrap:"wrap"}}>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search teams..." style={{flex:1,minWidth:"140px",background:"#141414",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"9px 13px",color:"#f0ece4",fontFamily:"'DM Sans',Georgia,sans-serif",fontSize:"13px"}}/>
                  <button className="sp" onClick={()=>{setFavView(f=>!f);setSearch("");}} style={{padding:"9px 14px",borderRadius:"8px",border:"1px solid "+(favView?"#f59e0b":"#2a2a2a"),background:favView?"#f59e0b22":"#141414",color:favView?"#f59e0b":"#bbb",fontSize:"13px",whiteSpace:"nowrap"}}>
                    {favView?"⭐":"☆"}{favs.length>0?` (${favs.length})`:""}
                  </button>
                </div>
                <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"12px"}}>
                  {SPORTS_FILTER.map(s=>{const on=filter===s;const cnt=ALL_TEAMS.filter(t=>t.sport===s).length;return<button key={s} className="sp" onClick={()=>setFilter(s)} style={{padding:"5px 11px",borderRadius:"20px",border:"1px solid "+(on?"#c8102e":"#2a2a2a"),background:on?"#c8102e":"#141414",color:on?"#fff":"#bbb",fontSize:"11px",fontFamily:"monospace"}}>{s}{s!=="ALL"?` ${cnt}`:""}</button>;})}
                </div>
                {favView&&favs.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#555",fontSize:"13px",fontStyle:"italic"}}>No favourites yet — tap ☆ on any team to add it here.</div>}
                <div style={{fontSize:"11px",color:"#444",fontFamily:"monospace",marginBottom:"10px"}}>{filtered.length} teams</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:"8px"}}>
                  {filtered.map(team=>{
                    const c=cache[team.name];
                    const isFav=favs.includes(team.name);
                    return(
                      <div key={team.name} className="tc" onClick={()=>{pick(team);setTeamTab("teams");}} style={{background:"#111",border:"1.5px solid "+(isFav?"#f59e0b44":"#252525"),borderRadius:"10px",padding:"12px 13px",position:"relative"}}>
                        {isFav&&<span style={{position:"absolute",top:"7px",right:"8px",fontSize:"11px"}}>⭐</span>}
                        <div style={{fontSize:"19px",marginBottom:"3px"}}>{team.emoji}</div>
                        <div style={{fontSize:"12px",fontWeight:"bold",marginBottom:"2px",lineHeight:1.3,color:"#f0ece4",paddingRight:isFav?"16px":"0"}}>{team.name}</div>
                        <div style={{fontSize:"10px",fontFamily:"monospace",color:"#555"}}>{team.sport}</div>
                        {c?.record?<div style={{marginTop:"4px",fontSize:"11px",color:team.accent,fontFamily:"monospace",fontWeight:"bold"}}>{c.record}</div>:<div style={{marginTop:"4px",fontSize:"10px",color:"#2a2a2a",fontFamily:"monospace"}}>tap for live stats</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── QUIZ TAB ── */}
        {appTab==="quiz"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            {!qDone?(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                  <div style={{fontFamily:"monospace",fontSize:"10px",color:"#888",letterSpacing:"0.1em"}}>QUESTION {qStep+1} OF {quiz.length}</div>
                  <div style={{display:"flex",gap:"4px"}}>{quiz.map((_,i)=><div key={i} style={{width:"20px",height:"3px",borderRadius:"2px",background:i<=qStep?"#c8102e":"#2a2a2a",transition:"background .3s"}}/>)}</div>
                </div>
                <div style={{background:"#111",border:"1px solid #252525",borderRadius:"12px",padding:"22px"}}>
                  <p style={{fontSize:"16px",fontWeight:"bold",margin:"0 0 16px",lineHeight:1.45,color:"#f0ece4"}}>{quiz[qStep].q}</p>
                  <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                    {quiz[qStep].options.map((opt,i)=><button key={i} className="qo" onClick={()=>doQ(quiz[qStep].bandwagon[i])} style={{background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#ddd",padding:"11px 14px",borderRadius:"7px",textAlign:"left",fontSize:"13px",fontFamily:"'DM Sans',Georgia,sans-serif",lineHeight:1.45,cursor:"pointer"}}>
                      <span style={{color:"#c8102e",fontFamily:"monospace",marginRight:"10px"}}>{String.fromCharCode(65+i)}.</span>{opt}
                    </button>)}
                  </div>
                </div>
              </div>
            ):(()=>{const r=bwLvl();return(
              <div style={{animation:"fadeIn .5s ease"}}>
                <div style={{background:"#111",border:"2px solid "+r.color,borderRadius:"12px",padding:"30px",textAlign:"center"}}>
                  <div style={{fontSize:"44px",marginBottom:"12px"}}>🏆</div>
                  <div style={{fontSize:"10px",letterSpacing:"0.3em",color:"#888",fontFamily:"monospace",marginBottom:"8px"}}>CERTIFICATION LEVEL</div>
                  <div style={{fontSize:"24px",fontWeight:"900",color:r.color,marginBottom:"10px"}}>{r.label}</div>
                  <p style={{color:"#ccc",fontSize:"13px",marginBottom:"18px"}}>{r.desc}</p>
                  <div style={{display:"inline-block",padding:"5px 16px",background:"#0d0d0d",border:"1px solid "+r.color+"55",borderRadius:"20px",fontFamily:"monospace",fontSize:"11px",color:"#aaa"}}>{qScore}/{quiz.length} bandwagon answers</div>
                  <div style={{marginTop:"18px"}}>
                    <button className="sp" onClick={()=>{setQS(0);setQSc(0);setQD(false);}} style={{background:"#c8102e",border:"none",color:"white",padding:"10px 20px",borderRadius:"6px",cursor:"pointer",fontSize:"13px",fontFamily:"'DM Sans',Georgia,sans-serif",fontWeight:"bold"}}>Retake</button>
                  </div>
                </div>
              </div>
            );})()}
          </div>
        )}

        <div style={{textAlign:"center",marginTop:"40px",paddingTop:"16px",borderTop:"1px solid #1a1a1a",fontSize:"10px",color:"#333",fontFamily:"monospace",letterSpacing:"0.08em"}}>
          FANBASE · {ALL_TEAMS.length} TEAMS · LIVE ESPN · POWERED BY BANDWAGON BOOTCAMP
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
